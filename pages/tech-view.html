<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TrafficWorks — Tech View</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<link rel="stylesheet" href="../css/tech-view.css">
</head>
<body>
<div class="tv-header">
  <div class="tv-header-left">
    <button class="tv-back-btn" id="backBtn" onclick="showProjects()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <span class="tv-greeting" id="greeting"></span>
    <div class="tv-project-info" id="barProjectInfo">
      <span class="tv-project-name-bar" id="barProjectName"></span>
      <span class="tv-project-loc-bar" id="barProjectLoc"></span>
    </div>
  </div>
  <div class="tv-header-right">
    <button class="tv-logout" onclick="handleLogout()">Log Out</button>
  </div>
</div>
<div class="tv-stats" id="projectStatsBar">
  <div class="tv-stat"><span class="tv-stat-value" id="statProjects">0</span><span class="tv-stat-label">needs attention</span></div>
  <div class="tv-stat-divider"></div>
  <div class="tv-stat"><span class="tv-stat-value" id="statOpenTasks">0</span><span class="tv-stat-label">open tasks</span></div>
</div>
<div class="tv-filter-bar" id="taskFilterBar">
  <div class="tv-filter-pill active" id="filterAll" onclick="toggleFilter('all')"><span class="tv-filter-value" id="filterAllVal">0</span><span class="tv-filter-label">Total</span></div>
  <div class="tv-filter-pill" id="filterPending" onclick="toggleFilter('Pending')"><span class="tv-filter-value" id="filterPendingVal">0</span><span class="tv-filter-label">Pending</span></div>
  <div class="tv-filter-pill" id="filterInfield" onclick="toggleFilter('In Field')"><span class="tv-filter-value" id="filterInfieldVal">0</span><span class="tv-filter-label">In Field</span></div>
</div>
<div id="taskProgressWrap" style="display:none">
  <div class="tv-task-progress">
    <div class="tv-task-progress-bar"><div class="tv-task-progress-fill" id="taskProgressFill" style="width:0%"></div></div>
    <span class="tv-task-progress-pct" id="taskProgressPct">0%</span>
  </div>
</div>
<div class="tv-print-overlay" id="printOverlay">
  <button class="tv-print-close" onclick="closePrintView()">&times;</button>
  <div id="printContent"></div>
</div>
<div class="tv-reopen-overlay" id="reopenOverlay">
  <div class="tv-reopen-modal">
    <div class="tv-reopen-title">Reopen Task</div>
    <div class="tv-reopen-sub" id="reopenTaskName"></div>
    <textarea class="tv-reopen-input" id="reopenReason" placeholder="Why are you reopening this task?"></textarea>
    <div class="tv-reopen-actions">
      <button class="tv-reopen-cancel" onclick="closeReopenModal()">Cancel</button>
      <button class="tv-reopen-confirm" onclick="confirmReopen()">Reopen</button>
    </div>
  </div>
</div>
<div class="tv-content">
  <div class="tv-view active" id="projectView"><div id="projectCards"></div></div>
  <div class="tv-view" id="taskView">
    <div class="tv-hold-hint" id="holdHint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 16"/></svg>
      Hold button to update status
      <button class="tv-hold-hint-dismiss" onclick="dismissHint()">Got it</button>
    </div>
    <div id="taskCards"></div>
  </div>
</div>
<script>
(function(){var h=new Date().getHours();if(h<7||h>=19)document.documentElement.classList.add('tv-dark')})();
var techName='Carlos';
(function(){var h=new Date().getHours();var g=h<12?'Good morning':h<17?'Good afternoon':'Good evening';document.getElementById('greeting').textContent=g+', '+techName})();
var STATUS={PENDING:'Pending',INFIELD:'In Field',COMPLETE:'Complete'};
var MAX_NOTE=100,durationInterval=null;
var projects=[
  {id:'p1',name:'Main St Intersection Study',location:'City of Monrovia',status:'In Progress',notes:'',tasks:[
    {id:1,site:1,desc:'Myrtle & Greystone',type:'TMC',status:STATUS.COMPLETE,note:'Client confirmed 48hr count',cycles:[{deployedAt:new Date('2026-02-25T06:42:00'),completedAt:new Date('2026-02-26T07:15:00'),tech:'Carlos M.'}],currentCycle:{deployedAt:null,completedAt:null}},
    {id:2,site:2,desc:'Foothill & Shamrock',type:'TMC',status:STATUS.COMPLETE,note:'',cycles:[],currentCycle:{deployedAt:new Date('2026-02-25T06:55:00'),completedAt:new Date('2026-02-26T07:22:00')}},
    {id:3,site:3,desc:'Huntington & 5th',type:'TMC',status:STATUS.INFIELD,note:'Battery at 80%',cycles:[],currentCycle:{deployedAt:new Date('2026-02-26T06:30:00'),completedAt:null}},
    {id:4,site:4,desc:'Duarte & Mountain',type:'TMC',status:STATUS.INFIELD,note:'',cycles:[],currentCycle:{deployedAt:new Date('2026-02-26T06:38:00'),completedAt:null}},
    {id:5,site:5,desc:'Colorado & Royal Oaks',type:'TMC',status:STATUS.PENDING,note:'',cycles:[],currentCycle:{deployedAt:null,completedAt:null}},
    {id:6,site:6,desc:'Greystone NB',type:'SPD',status:STATUS.PENDING,note:'Homeowner on NE corner said OK to mount',cycles:[{deployedAt:new Date('2026-02-24T07:00:00'),completedAt:new Date('2026-02-24T09:30:00'),tech:'Carlos M.',reopenReason:'Equipment damaged',reopenedBy:'manager'}],currentCycle:{deployedAt:null,completedAt:null}},
    {id:7,site:7,desc:'Greystone SB',type:'SPD',status:STATUS.INFIELD,note:'',cycles:[],currentCycle:{deployedAt:new Date('2026-02-26T05:50:00'),completedAt:null}},
    {id:8,site:8,desc:'Shamrock Ave',type:'ADT',status:STATUS.PENDING,note:'',cycles:[],currentCycle:{deployedAt:null,completedAt:null}}
  ]},
  {id:'p2',name:'Hwy 101 NB/SB Tube Count',location:'City of Calabasas',status:'In Progress',notes:'Caltrans encroachment permit #EP-2026-0441. Work hours 9PM-6AM only. CHP escort required.',tasks:[
    {id:9,site:1,desc:'NB Lane 1-2',type:'ADT',status:STATUS.COMPLETE,note:'',cycles:[],currentCycle:{deployedAt:new Date('2026-02-24T05:30:00'),completedAt:new Date('2026-02-25T06:00:00')}},
    {id:10,site:2,desc:'NB Lane 3-4',type:'ADT',status:STATUS.COMPLETE,note:'Shifted 5ft east due to pothole',cycles:[],currentCycle:{deployedAt:new Date('2026-02-24T05:45:00'),completedAt:new Date('2026-02-25T06:10:00')}},
    {id:11,site:3,desc:'SB Lane 1-2',type:'ADT',status:STATUS.INFIELD,note:'',cycles:[],currentCycle:{deployedAt:new Date('2026-02-26T05:15:00'),completedAt:null}},
    {id:12,site:4,desc:'SB Lane 3-4',type:'ADT',status:STATUS.PENDING,note:'',cycles:[],currentCycle:{deployedAt:null,completedAt:null}}
  ]},
  {id:'p3',name:'Rosemead Blvd Speed Survey',location:'City of Temple City',status:'Complete',notes:'',tasks:[
    {id:13,site:1,desc:'Rosemead NB',type:'SPD',status:STATUS.COMPLETE,note:'',cycles:[],currentCycle:{deployedAt:new Date('2026-02-20T07:00:00'),completedAt:new Date('2026-02-21T07:30:00')}},
    {id:14,site:2,desc:'Rosemead SB',type:'SPD',status:STATUS.COMPLETE,note:'',cycles:[],currentCycle:{deployedAt:new Date('2026-02-20T07:15:00'),completedAt:new Date('2026-02-21T07:45:00')}},
    {id:15,site:3,desc:'Tube Backup NB',type:'ADT',status:STATUS.COMPLETE,note:'',cycles:[],currentCycle:{deployedAt:new Date('2026-02-20T07:30:00'),completedAt:new Date('2026-02-21T08:00:00')}}
  ]}
];
var currentProject=null,activeFilter='all',completedCollapsed=false,hintDismissed=false,openNoteId=null;
function taskCounts(t){return{total:t.length,pending:t.filter(function(x){return x.status===STATUS.PENDING}).length,infield:t.filter(function(x){return x.status===STATUS.INFIELD}).length,complete:t.filter(function(x){return x.status===STATUS.COMPLETE}).length}}
function pct(c){return c.total>0?Math.round((c.complete/c.total)*100):0}
function fmtDuration(ms){if(ms<0)ms=0;var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h+'h '+m+'m'}
function getLiveDuration(t){if(t.status!==STATUS.INFIELD||!t.currentCycle.deployedAt)return'';return fmtDuration(Date.now()-t.currentCycle.deployedAt.getTime())}
function startDurationTimer(){stopDurationTimer();durationInterval=setInterval(function(){document.querySelectorAll('.live-duration').forEach(function(el){var taskId=parseInt(el.dataset.taskId);var task=currentProject?currentProject.tasks.find(function(t){return t.id===taskId}):null;if(task&&task.status===STATUS.INFIELD&&task.currentCycle.deployedAt){el.textContent=fmtDuration(Date.now()-task.currentCycle.deployedAt.getTime())}})},60000)}
function stopDurationTimer(){if(durationInterval){clearInterval(durationInterval);durationInterval=null}}
function toggleBtnClass(s){return s===STATUS.PENDING?'toggle-pending':s===STATUS.INFIELD?'toggle-infield':'toggle-complete'}
function actionLabel(s){return s===STATUS.PENDING?'Pending':s===STATUS.INFIELD?'In Field':'Reopen'}
function isProjectComplete(p){return p.tasks.every(function(t){return t.status===STATUS.COMPLETE})}
function handleLogout(){window.location.href='login.html'}

function showProjects(){
  currentProject=null;activeFilter='all';completedCollapsed=false;openNoteId=null;stopDurationTimer();
  document.getElementById('projectView').classList.add('active');
  document.getElementById('taskView').classList.remove('active');
  document.getElementById('projectStatsBar').style.display='';
  document.getElementById('taskFilterBar').style.display='none';
  document.getElementById('taskProgressWrap').style.display='none';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('barProjectInfo').classList.remove('visible');
  document.getElementById('greeting').style.display='';
  renderProjectStats();renderProjectCards();
}
function renderProjectStats(){
  var active=projects.filter(function(p){return!isProjectComplete(p)});
  var allTasks=projects.flatMap(function(p){return p.tasks});
  var open=allTasks.filter(function(t){return t.status!==STATUS.COMPLETE}).length;
  document.getElementById('statProjects').textContent=active.length;
  document.getElementById('statOpenTasks').textContent=open;
}
function renderProjectCards(){
  var active=projects.filter(function(p){return!isProjectComplete(p)});
  var complete=projects.filter(function(p){return isProjectComplete(p)});
  var sorted=active.concat(complete);
  document.getElementById('projectCards').innerHTML=sorted.map(function(p){
    var c=taskCounts(p.tasks),done=isProjectComplete(p);
    var parts=[];
    if(c.pending>0)parts.push(c.pending+' pending');
    if(c.infield>0)parts.push(c.infield+' in field');
    if(done)parts.push('All complete');
    var taskLine=parts.join('<span class="dot"></span>');
    var notesHTML='';
    if(p.notes){notesHTML='<div class="tv-card-notes" onclick="event.stopPropagation();toggleCardNotes(\''+p.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Tech Instructions</div><div class="tv-card-notes-body" id="card-notes-'+p.id+'">'+p.notes+'</div>'}
    return '<div class="tv-project-card'+(done?' card-complete':'')+'" onclick="openProject(\''+p.id+'\')"><div class="tv-card-name">'+p.name+'</div><div class="tv-card-location">'+p.location+'</div><div class="tv-card-tasks">'+taskLine+'</div>'+notesHTML+'<div class="tv-card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div></div>';
  }).join('');
}

function openProject(id){
  currentProject=projects.find(function(p){return p.id===id});if(!currentProject)return;
  document.getElementById('projectView').classList.remove('active');
  document.getElementById('taskView').classList.add('active');
  document.getElementById('projectStatsBar').style.display='none';
  document.getElementById('taskFilterBar').style.display='flex';
  document.getElementById('taskProgressWrap').style.display='';
  document.getElementById('backBtn').style.display='flex';
  document.getElementById('barProjectInfo').classList.add('visible');
  document.getElementById('barProjectName').textContent=currentProject.name;
  document.getElementById('barProjectLoc').textContent=currentProject.location;
  document.getElementById('greeting').style.display='none';
  document.getElementById('holdHint').style.display=hintDismissed?'none':'flex';
  activeFilter='all';completedCollapsed=false;openNoteId=null;
  renderTaskView();startDurationTimer();
}
function dismissHint(){hintDismissed=true;document.getElementById('holdHint').style.display='none'}
function toggleCardNotes(id){var el=document.getElementById('card-notes-'+id);if(el)el.classList.toggle('open')}
function renderTaskView(){renderTaskSummary();renderTaskCards()}
function renderTaskSummary(){
  var c=taskCounts(currentProject.tasks),percentage=pct(c);
  document.getElementById('filterAllVal').textContent=c.total;
  document.getElementById('filterPendingVal').textContent=c.pending;
  document.getElementById('filterInfieldVal').textContent=c.infield;
  document.getElementById('filterAll').className='tv-filter-pill'+(activeFilter==='all'?' active':'');
  document.getElementById('filterPending').className='tv-filter-pill'+(activeFilter===STATUS.PENDING?' active':'');
  document.getElementById('filterInfield').className='tv-filter-pill'+(activeFilter===STATUS.INFIELD?' active':'');
  document.getElementById('taskProgressFill').style.width=percentage+'%';
  document.getElementById('taskProgressPct').textContent=percentage+'%';
}
function toggleFilter(key){activeFilter=activeFilter===key?'all':key;if(key==='all')activeFilter='all';renderTaskView()}
function renderTaskCards(){
  var container=document.getElementById('taskCards'),tasks=currentProject.tasks,openTasks,completedTasks;
  if(activeFilter==='all'){openTasks=tasks.filter(function(t){return t.status!==STATUS.COMPLETE});completedTasks=tasks.filter(function(t){return t.status===STATUS.COMPLETE})}
  else if(activeFilter===STATUS.COMPLETE){openTasks=[];completedTasks=tasks.filter(function(t){return t.status===STATUS.COMPLETE})}
  else{openTasks=tasks.filter(function(t){return t.status===activeFilter});completedTasks=[]}
  var html='';
  openTasks.forEach(function(t){html+=taskCardHTML(t,false)});
  if(completedTasks.length>0){
    html+='<div class="tv-completed-divider '+(completedCollapsed?'collapsed':'')+'" onclick="toggleCompleted()"><div class="tv-completed-divider-line"></div><span class="tv-completed-divider-text"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>Complete ('+completedTasks.length+')</span><div class="tv-completed-divider-line"></div></div>';
    if(!completedCollapsed)completedTasks.forEach(function(t){html+=taskCardHTML(t,true)});
  }
  if(openTasks.length===0&&completedTasks.length===0)html='<div class="tv-empty-state">No tasks match this filter</div>';
  html+='<div class="tv-download-link" onclick="downloadPDF(\''+currentProject.id+'\')">Download task list</div>';
  container.innerHTML=html;
  container.querySelectorAll('.toggle-btn').forEach(function(btn){if(btn.dataset.action==='reopen')setupHoldButton(btn,800,promptReopen);else setupHoldButton(btn,600,cycleTaskStatus)});
}
function taskCardHTML(t,isComplete){
  var cc=isComplete?'complete-card':'';
  var noteClass=t.note?'tv-note-indicator has-note':'tv-note-indicator empty';
  var noteIconSvg=t.note?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
  // Detail row items
  var details=[];
  details.push('<span class="tv-task-site">#'+t.site+'</span>');
  if(t.type)details.push('<span class="tv-task-type">'+t.type+'</span>');
  if(t.status===STATUS.INFIELD&&t.currentCycle.deployedAt)details.push('<span class="tv-task-duration live-duration" data-task-id="'+t.id+'">'+getLiveDuration(t)+'</span>');
  details.push('<button class="'+noteClass+'" onclick="toggleNote('+t.id+',event)">'+noteIconSvg+'</button>');
  var detailHTML=details.join('<span class="tv-detail-dot"></span>');
  // Reopen reason row
  var reopenHTML='';
  if(t.cycles.length>0&&t.status===STATUS.PENDING){var lc=t.cycles[t.cycles.length-1];if(lc.reopenReason)reopenHTML='<div class="tv-task-reopen-row"><span class="tv-task-reopen-reason">Reopened: '+lc.reopenReason+'</span></div>'}
  // Action button
  var actionHTML='';
  if(isComplete){actionHTML='<button class="toggle-btn toggle-complete" data-task-id="'+t.id+'" data-action="reopen"><div class="toggle-fill"></div><span class="toggle-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><polyline points="3 3 3 7 7 7"/></svg> Reopen</span></button>'}
  else{actionHTML='<button class="toggle-btn '+toggleBtnClass(t.status)+'" data-task-id="'+t.id+'"><div class="toggle-fill"></div><span class="toggle-label">'+actionLabel(t.status)+'</span></button>'}
  // Note panel
  var notePanel='<div class="tv-note-panel'+(openNoteId===t.id?' open':'')+'" id="note-panel-'+t.id+'"><div class="tv-note-panel-inner"><input class="tv-note-input" maxlength="'+MAX_NOTE+'" placeholder="Add a quick note…" value="'+(t.note||'').replace(/"/g,'&quot;')+'" oninput="updateCharCount('+t.id+',this)" onkeydown="if(event.key===\'Enter\')saveNote('+t.id+')"><span class="tv-note-char-count" id="char-count-'+t.id+'">'+(MAX_NOTE-(t.note||'').length)+'</span><button class="tv-note-save-btn" onclick="saveNote('+t.id+')">Save</button></div></div>';
  return '<div class="tv-task-card '+cc+'"><div class="tv-task-inner"><div class="tv-task-content"><div class="tv-task-desc">'+t.desc+'</div><div class="tv-task-divider"></div><div class="tv-task-detail-row">'+detailHTML+'</div>'+reopenHTML+'</div><div class="tv-task-action">'+actionHTML+'</div></div>'+notePanel+'</div>';
}
function toggleCompleted(){completedCollapsed=!completedCollapsed;renderTaskCards()}
function toggleNote(id,e){e.stopPropagation();openNoteId=openNoteId===id?null:id;renderTaskCards();if(openNoteId===id){var input=document.querySelector('#note-panel-'+id+' .tv-note-input');if(input)setTimeout(function(){input.focus()},250)}}
function updateCharCount(id,input){var r=MAX_NOTE-input.value.length;var el=document.getElementById('char-count-'+id);if(el){el.textContent=r;el.classList.toggle('warn',r<15)}}
function saveNote(id){var input=document.querySelector('#note-panel-'+id+' .tv-note-input');if(!input)return;var task=currentProject.tasks.find(function(t){return t.id===id});if(task)task.note=input.value.trim();openNoteId=null;renderTaskCards()}
function setupHoldButton(btn,duration,callback){var timer=null;function start(e){e.preventDefault();btn.classList.add('holding');timer=setTimeout(function(){btn.classList.remove('holding');if(navigator.vibrate)navigator.vibrate(30);callback(parseInt(btn.dataset.taskId))},duration)}function end(){clearTimeout(timer);btn.classList.remove('holding')}btn.addEventListener('pointerdown',start,{passive:false});btn.addEventListener('pointerup',end);btn.addEventListener('pointerleave',end);btn.addEventListener('pointercancel',end)}
function cycleTaskStatus(taskId){var task=currentProject.tasks.find(function(t){return t.id===taskId});if(!task)return;if(task.status===STATUS.PENDING){task.status=STATUS.INFIELD;task.currentCycle.deployedAt=new Date()}else if(task.status===STATUS.INFIELD){task.status=STATUS.COMPLETE;task.currentCycle.completedAt=new Date()}renderTaskView();renderProjectStats()}
var reopenTargetId=null;
function promptReopen(taskId){
  var task=currentProject.tasks.find(function(t){return t.id===taskId});if(!task)return;
  reopenTargetId=taskId;
  document.getElementById('reopenTaskName').textContent='"'+task.desc+'"';
  document.getElementById('reopenReason').value='';
  document.getElementById('reopenOverlay').classList.add('visible');
  setTimeout(function(){document.getElementById('reopenReason').focus()},200);
}
function closeReopenModal(){document.getElementById('reopenOverlay').classList.remove('visible');reopenTargetId=null}
function confirmReopen(){
  if(reopenTargetId===null)return;
  var task=currentProject.tasks.find(function(t){return t.id===reopenTargetId});if(!task)return;
  var reason=document.getElementById('reopenReason').value.trim()||'Reopened by tech';
  if(task.currentCycle.deployedAt){
    task.cycles.push({deployedAt:task.currentCycle.deployedAt,completedAt:task.currentCycle.completedAt,tech:techName,reopenReason:reason,reopenedBy:'tech'});
  }
  task.status=STATUS.PENDING;
  task.currentCycle={deployedAt:null,completedAt:null};
  closeReopenModal();renderTaskView();renderProjectStats();
}
document.getElementById('reopenOverlay').addEventListener('click',function(e){if(e.target===this)closeReopenModal()});
function downloadPDF(projectId){var p=projects.find(function(x){return x.id===projectId});if(!p)return;var tasks=p.tasks||[];var pending=tasks.filter(function(t){return t.status===STATUS.PENDING});var infield=tasks.filter(function(t){return t.status===STATUS.INFIELD});var html='<div class="print-title">'+p.name+'</div><div class="print-location">'+p.location+'</div>';if(p.notes){html+='<div class="print-notes"><div class="print-notes-label">Tech Instructions</div><div class="print-notes-text">'+p.notes+'</div></div>'}function renderSection(title,cls,list){if(list.length===0)return'';var s='<div class="print-section print-section-'+cls+'"><div class="print-section-title">'+title+' ('+list.length+')</div><table class="print-table"><tbody>';list.forEach(function(t){s+='<tr><td class="site-num">'+t.site+'</td><td class="task-desc">'+t.desc+'</td></tr>'});return s+'</tbody></table></div>'}html+=renderSection('Pending','pending',pending);html+=renderSection('In Field','infield',infield);var now=new Date();html+='<div class="print-footer"><span>Generated '+(now.getMonth()+1)+'/'+now.getDate()+'/'+now.getFullYear()+' '+now.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})+'</span><span>TrafficWorks</span></div>';document.getElementById('printContent').innerHTML=html;document.getElementById('printOverlay').classList.add('visible')}
function closePrintView(){document.getElementById('printOverlay').classList.remove('visible')}
showProjects();
</script>
</body>
</html>
